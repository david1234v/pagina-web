<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nápoles Admin — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Floating food emojis */
    .food-float {
      position: fixed;
      font-size: 2rem;
      pointer-events: none;
      animation: floatUp linear infinite;
      opacity: 0.15;
      z-index: 0;
      user-select: none;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
      10%  { opacity: 0.15; }
      90%  { opacity: 0.15; }
      100% { transform: translateY(-15vh) rotate(360deg); opacity: 0; }
    }

    /* Login card */
    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 1rem;
      animation: fadeIn 0.6s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    .login-card {
      background: rgba(30, 34, 53, 0.95);
      border: 1px solid rgba(255, 107, 53, 0.2);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,107,53,0.05);
      backdrop-filter: blur(12px);
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #ff6b35, #e63946);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.8rem;
      box-shadow: 0 8px 24px rgba(255,107,53,0.4);
    }

    .login-title {
      color: #e8e8f0;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    .login-subtitle {
      color: #9a9ab0;
      font-size: 0.82rem;
      margin-top: 0.3rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }
    .form-label {
      display: block;
      color: #9a9ab0;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }
    .input-wrapper {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      color: #9a9ab0;
      font-size: 0.9rem;
      pointer-events: none;
    }
    .form-input {
      width: 100%;
      background: rgba(15,17,23,0.8);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 0.75rem 0.9rem 0.75rem 2.6rem;
      color: #e8e8f0;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .form-input::placeholder { color: #4a4a6a; }
    .form-input:focus {
      border-color: #ff6b35;
      box-shadow: 0 0 0 3px rgba(255,107,53,0.15);
    }

    .toggle-pwd {
      position: absolute;
      right: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: #9a9ab0;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0;
      transition: color 0.2s;
    }
    .toggle-pwd:hover { color: #ff6b35; }

    .error-msg {
      background: rgba(230,57,70,0.12);
      border: 1px solid rgba(230,57,70,0.3);
      border-radius: 8px;
      color: #e63946;
      font-size: 0.8rem;
      padding: 0.6rem 0.9rem;
      margin-bottom: 1rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }
    .error-msg.show { display: flex; }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, #ff6b35, #e63946);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 0.85rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(255,107,53,0.3);
      margin-top: 0.4rem;
    }
    .btn-login:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(255,107,53,0.4);
    }
    .btn-login:active { transform: translateY(0); }

    .btn-login.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
    }
    .back-link {
      color: #9a9ab0;
      text-decoration: none;
      font-size: 0.82rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: #ff6b35; }

    .brand-tag {
      color: rgba(255,255,255,0.08);
      font-size: 0.72rem;
      text-align: center;
      margin-top: 1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<!-- Floating food emojis (decorative) -->
<script>
  const foods = ['🍔','🍟','🌮','🥪','🌯','🍕','🥩','🧀','🥓','🍳','🌭','🥗'];
  foods.forEach((emoji, i) => {
    const el = document.createElement('div');
    el.className = 'food-float';
    el.textContent = emoji;
    el.style.left = (Math.random() * 95) + 'vw';
    el.style.animationDuration = (12 + Math.random() * 16) + 's';
    el.style.animationDelay = (Math.random() * 12) + 's';
    el.style.fontSize = (1.2 + Math.random() * 1.5) + 'rem';
    document.body.appendChild(el);
  });
</script>

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <div class="login-icon">🔐</div>
      <h1 class="login-title">Panel Admin</h1>
      <p class="login-subtitle">🍔 Nápoles Chipiona</p>
    </div>

    <div class="error-msg" id="errorMsg">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorText">Usuario o contraseña incorrectos</span>
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="username">Usuario</label>
        <div class="input-wrapper">
          <i class="fas fa-user input-icon"></i>
          <input class="form-input" type="text" id="username" name="username"
                 placeholder="admin" autocomplete="username" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input class="form-input" type="password" id="password" name="password"
                 placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="toggle-pwd" id="togglePwd" aria-label="Mostrar/ocultar contraseña">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
      </button>
    </form>

    <div class="login-footer">
      <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Volver al sitio web
      </a>
    </div>

    <div class="brand-tag">Nápoles &bull; Chipiona &bull; Admin</div>
  </div>
</div>

<script>
  // Toggle password visibility
  document.getElementById('togglePwd').addEventListener('click', function () {
    const pwd = document.getElementById('password');
    const icon = this.querySelector('i');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.className = 'fas fa-eye-slash';
    } else {
      pwd.type = 'password';
      icon.className = 'fas fa-eye';
    }
  });

  // Login form submission
  document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');
    const btn = document.getElementById('loginBtn');

    // Show loading state
    btn.classList.add('loading');
    btn.textContent = 'Verificando...';
    errorMsg.classList.remove('show');

    // Get stored password (supports password change from config)
    const storedPassword = localStorage.getItem('napoles-admin-password') || 'napoles2026';

    setTimeout(function () {
      if (username === 'admin' && password === storedPassword) {
        // Successful login
        localStorage.setItem('napoles-admin-session', 'true');
        btn.textContent = '✅ Accediendo...';
        setTimeout(function () {
          window.location.href = 'admin.html';
        }, 400);
      } else {
        // Failed login
        btn.classList.remove('loading');
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Iniciar Sesión';

        if (username !== 'admin') {
          errorText.textContent = 'El usuario "' + username + '" no existe';
        } else {
          errorText.textContent = 'Contraseña incorrecta. Inténtalo de nuevo.';
        }
        errorMsg.classList.add('show');

        // Shake the card
        const card = document.querySelector('.login-card');
        card.style.animation = 'none';
        card.offsetHeight; // reflow
        card.style.animation = 'shake 0.4s ease';
      }
    }, 600);
  });

  // Shake animation via JS
  const style = document.createElement('style');
  style.textContent = `
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }
  `;
  document.head.appendChild(style);

  // If already logged in, redirect
  if (localStorage.getItem('napoles-admin-session') === 'true') {
    window.location.href = 'admin.html';
  }
</script>
</body>
</html>
